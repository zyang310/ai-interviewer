# Release — builds the versioned macOS app and publishes it as a public GitHub
# Release. This is the build anyone can download AND the one the in-app updater
# compares against.
#
# Two ways in:
#
#   1. Normal path — release-please.yml merges the Release PR, creates the
#      vX.Y.Z tag plus a GitHub Release carrying the changelog, then CALLS this
#      workflow to build the app and attach it to that release.
#
#   2. Escape hatch — a hand-pushed tag still works, for a hotfix or to re-run a
#      release whose build failed:
#
#          git tag v0.8.0 && git push origin v0.8.0
#
#      On this path no Release exists yet, so this workflow creates it.
#
# Either way the tag is the single source of truth for the version: it is stamped
# into the binary (-ldflags) and the macOS plist (wails.json productVersion).
name: Release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Version tag to build and attach, e.g. v0.8.0"
        required: true
        type: string
  # Manual re-run against a tag that already exists. Useful when a release was
  # published but its build needs redoing — e.g. it went out unsigned because the
  # signing secrets weren't in place yet. Rebuilds and replaces the attached
  # .zip in place, so no version number is wasted proving CI works.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild and re-attach, e.g. v0.9.0"
        required: true
        type: string

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  release:
    name: Build & publish (macOS universal)
    runs-on: macos-latest
    # Comfortably above the 150m notarization wait, but well under the 6h default
    # so a genuinely wedged run fails in a useful timeframe instead of idling.
    timeout-minutes: 180
    steps:
      # `inputs.tag` is set when release-please calls us. On a hand-pushed tag the
      # inputs context is empty, so fall back to the ref that triggered the run.
      # Everything downstream reads the tag from here, never from the ref.
      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"   # e.g. v0.8.0
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "num=${TAG#v}" >> "$GITHUB_OUTPUT"      # 0.8.0 (no leading v) for the plist

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.tag }} # build the tagged commit, not whatever main is now
          fetch-depth: 0 # full history + the annotated tag object, so we can read its message below

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Escape-hatch path only: curated highlights come from the annotated tag's
      # message body. release-please creates lightweight tags and writes the real
      # changelog into the release itself, so this is empty there — which is what
      # we want, since the notes are already in place.
      - name: Extract release highlights from tag
        id: notes
        run: |
          BODY="$(git for-each-ref "refs/tags/${{ steps.ver.outputs.tag }}" --format='%(contents:body)')"
          {
            echo "highlights<<__NOTES_EOF__"
            echo "$BODY"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      # Stamp the macOS plist version so Finder "Get Info" matches the tag. On the
      # release-please path the committed wails.json already carries this version
      # (see extra-files in release-please-config.json); re-stamping from the tag
      # keeps the hand-tagged path correct too, and costs nothing.
      - name: Stamp plist version
        env:
          NUM: ${{ steps.ver.outputs.num }}
        run: |
          node -e "const fs=require('fs');const p='wails.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.info=j.info||{};j.info.productVersion=process.env.NUM;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      # wails build also builds the frontend (wails.json frontend:build). The tag
      # is injected as main.version, which is what the in-app updater reads.
      - name: Wails build (darwin/universal)
        run: wails build -platform darwin/universal -ldflags "-X main.version=${{ steps.ver.outputs.tag }}"

      # ── Sign & notarize ──────────────────────────────────────────────────
      # All four steps below are skipped when MACOS_CERTIFICATE is absent, so the
      # workflow still produces a working (unsigned) release before the signing
      # secrets exist — and starts signing automatically once they are added,
      # with no edit here. `secrets` can't be referenced in a job-level `if`,
      # hence probing it once into an output.
      - name: Check for signing credentials
        id: signing
        env:
          CERT: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing credentials present — this build will be signed and notarized."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MACOS_CERTIFICATE is empty — publishing an UNSIGNED build."
            echo "::warning::If the secret DOES exist in repo settings, the cause is almost"
            echo "::warning::certainly a missing 'secrets: inherit' on the job that calls this"
            echo "::warning::workflow — called workflows receive no secrets unless passed."
          fi

      # Runners are ephemeral, but a dedicated keychain still beats touching the
      # default one: it keeps the key out of any other step and dies with the VM.
      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Without this, codesign blocks on a GUI prompt to use the key and the job hangs.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          # Keep the login keychain in the search list so system roots still resolve.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          rm -f "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN"

      # No --deep: Apple advises against it for signing (it's for verification).
      # A Wails bundle has no nested code, so signing the bundle alone is right —
      # and the --deep --strict verify below would fail loudly if that changed.
      - name: Sign
        if: steps.signing.outputs.enabled == 'true'
        env:
          IDENTITY: "Developer ID Application: Zhi Hang Yang (DJ7U5LFM22)"
        run: |
          set -euo pipefail
          APP="build/bin/$(ls build/bin | grep '\.app$' | head -1)"

          codesign --force --timestamp --options runtime \
            --entitlements build/darwin/entitlements.plist \
            --sign "$IDENTITY" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

          # --verify is not sufficient on its own: it reports "valid on disk" for a
          # bundle whose executable is missing entirely (observed on a stale local
          # build). Assert the two things that actually matter instead.
          test -x "$APP/Contents/MacOS/Mogi" \
            || { echo "::error::bundle has no executable at Contents/MacOS/Mogi"; exit 1; }
          codesign -d --entitlements - "$APP" 2>/dev/null \
            | grep -q 'com.apple.security.device.audio-input' \
            || { echo "::error::microphone entitlement missing — voice input would fail under the hardened runtime"; exit 1; }

      - name: Notarize
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="build/bin/$(ls build/bin | grep '\.app$' | head -1)"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY" | base64 --decode > "$KEY_PATH"

          # notarytool takes an archive, never a bare .app.
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"

          # Apple documents "most within 15 minutes", but this Developer ID is new
          # and its first two submissions both ran past 79 minutes before being
          # Accepted — so 30m and 60m were both too tight. The ceiling here is
          # patience, not correctness: a timeout stops us waiting, it does NOT
          # cancel the submission, which keeps processing on Apple's side.
          #
          # An idle macOS runner is free on a public repo, so a generous bound
          # costs nothing but wall-clock and buys a release that doesn't need
          # babysitting. Expect this to be revisitable downward once the account
          # has some history — new-account slowness is widely reported to settle.
          set +e
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID" \
            --wait --timeout 150m
          STATUS=$?
          set -e

          # On rejection the log is the only thing that says why, so always fetch it.
          if [ $STATUS -ne 0 ]; then
            echo "::error::Notarization failed — fetching the most recent submission log"
            SUB="$(xcrun notarytool history --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" \
                    --issuer "$APPLE_API_ISSUER_ID" -f json | python3 -c 'import json,sys; print(json.load(sys.stdin)["history"][0]["id"])')"
            xcrun notarytool log "$SUB" --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" || true
          fi

          rm -f "$KEY_PATH"
          exit $STATUS

      # Stapling writes the ticket into the bundle so it validates offline. This
      # MUST happen before the release zip is built, or users download an app
      # that needs to phone Apple on first launch.
      - name: Staple & verify
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          APP="build/bin/$(ls build/bin | grep '\.app$' | head -1)"
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          # The real test: what Gatekeeper will say on a user's machine.
          spctl --assess --type execute --verbose=4 "$APP"

      - name: Package .app
        id: pkg
        run: |
          cd build/bin
          app="$(ls -d *.app | head -1)"
          zip="Mogi-${{ steps.ver.outputs.tag }}-macos-universal.zip"
          ditto -c -k --keepParent "$app" "$zip"
          echo "zip=build/bin/$zip" >> "$GITHUB_OUTPUT"
          echo "appname=$app" >> "$GITHUB_OUTPUT"

      # The install steps differ entirely between a notarized and an unsigned
      # build, so compose them here rather than shipping stale advice: telling a
      # user to right-click→Open an app that no longer needs it is worse than
      # saying nothing, because it implies the app is still untrusted.
      - name: Compose release body
        id: install
        run: |
          APP_NAME='${{ steps.pkg.outputs.appname }}'
          {
            echo 'body<<__INSTALL_EOF__'
            # A manual re-run targets a release that already has its notes, and
            # append_body would duplicate them. Emit nothing and just swap the asset.
            if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo '${{ steps.notes.outputs.highlights }}'
              echo ''
              echo 'macOS universal build — runs on Apple Silicon and Intel Macs.'
              echo ''
              echo '### Install'
              echo '1. Download the `.zip` below and unzip it.'
              echo "2. Drag **$APP_NAME** into your **Applications** folder."
              if [ "${{ steps.signing.outputs.enabled }}" = "true" ]; then
                echo '3. Open it. That’s it.'
                echo ''
                echo 'Signed with a Developer ID certificate and notarized by Apple, so it'
                echo 'launches without Gatekeeper warnings.'
              else
                echo '3. This build is **unsigned**, so the first launch needs one extra step'
                echo '   to get past macOS Gatekeeper (you only do this once):'
                echo '   - **Right-click** the app → **Open** → **Open** in the dialog, **or**'
                echo "   - run in Terminal: \`xattr -cr \"/Applications/$APP_NAME\"\`"
              fi
              echo ''
              echo 'Already have it installed? The app checks for updates on launch and'
              echo 'shows a banner when a newer version is here.'
            fi
            echo '__INSTALL_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }} # explicit: on workflow_call the ref is a branch, not the tag
          files: ${{ steps.pkg.outputs.zip }}
          # On the release-please path the Release already exists with the generated
          # changelog, so append the install notes rather than clobbering it. On the
          # hand-tagged path nothing exists yet, so let GitHub write its auto-notes.
          append_body: true
          generate_release_notes: ${{ inputs.tag == '' }}
          body: ${{ steps.install.outputs.body }}
